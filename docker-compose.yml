services:
  app:
    build: .
    container_name: restaurantos_app
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - restaurantos

  db:
    image: mysql:8.0
    container_name: restaurantos_db
    ports:
      - "3307:3306"  
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$DB_ROOT_PASS"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - restaurantos

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: restaurantos_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASS}
    depends_on:
      - db
    networks:
      - restaurantos

volumes:
  db_data:

networks:
  restaurantos:
    driver: bridge
